name: Build and Push vast image

on:
  push:
    branches: [main]
    paths:
      - Dockerfile.vast
      - Dockerfile.vast-vllm
      - .github/workflows/build-push.yml
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc /usr/local/.ghcup /usr/local/share/boost
          sudo docker image prune -af
          df -h

      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Lowercase owner
        id: owner
        run: echo "lc=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Build and push (SGLang)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.vast
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.lc }}/qwen-vast-sglang:latest
            ghcr.io/${{ steps.owner.outputs.lc }}/qwen-vast-sglang:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push (vLLM)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.vast-vllm
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.lc }}/qwen-vast-vllm:latest
            ghcr.io/${{ steps.owner.outputs.lc }}/qwen-vast-vllm:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
