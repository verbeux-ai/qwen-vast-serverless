name: Build and Push vast image

on:
  push:
    branches: [main]
    paths:
      - Dockerfile.vast
      - Dockerfile.vast-vllm
      - .github/workflows/build-push.yml
  workflow_dispatch:

jobs:
  build:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: useblacksmith/setup-docker-builder@v1
        with:
          max-cache-size-mb: "409600"

      - name: Lowercase owner
        id: owner
        run: echo "lc=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Build and push (SGLang)
        uses: useblacksmith/build-push-action@v2
        with:
          context: .
          file: ./Dockerfile.vast
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.lc }}/qwen-sglang-serverless:latest

      - name: Build and push (vLLM)
        uses: useblacksmith/build-push-action@v2
        with:
          context: .
          file: ./Dockerfile.vast-vllm
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.lc }}/qwen-vast-serverless:latest
            ghcr.io/${{ steps.owner.outputs.lc }}/qwen-vast-serverless:${{ github.sha }}
